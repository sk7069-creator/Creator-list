  function nowStr(){ var d=new Date(); function z(n){return (n<10?"0":"")+n;} return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate())+" "+z(d.getHours())+":"+z(d.getMinutes()); }
  function logEdit(name, field, before, after){ editLog.unshift({t:nowStr(), name:name, field:field, before:String(before==null?"":before), after:String(after==null?"":after), kind:"edit"}); saveLog(); }
  function logAction(name, action){ editLog.unshift({t:nowStr(), name:name, field:"", before:"", after:"", kind:action}); saveLog(); }

  // 숏폼 1·2·3채널: 값이 있는 마지막 칸이 뒤따르는 빈칸을 흡수해 병합
  //   1400, 빈,  빈  → 1~3 병합 / 800, 1000, 빈 → 2~3 병합 / 값,값,값 → 병합 없음
  function autoMerge(obj){
    var sv=[obj.s1,obj.s2,obj.s3].map(function(v){ return String(v==null?"":v).trim(); });
    var lastFilled=-1;
    for(var i=0;i<3;i++){ if(sv[i]!=="") lastFilled=i; }
    if(lastFilled>=0 && lastFilled<2){
      var allEmptyAfter=true;
      for(var j=lastFilled+1;j<3;j++){ if(sv[j]!==""){ allEmptyAfter=false; break; } }
      if(allEmptyAfter){ obj._m=[{c1:1+lastFilled, c2:3}]; return obj; }
    }
    if(obj._m) delete obj._m;
    return obj;
  }

  function loadData(){
    try{
      var s=localStorage.getItem(LS_KEY);
      if(s){
        var p=JSON.parse(s);
        if(Array.isArray(p)&&p.length){
          // 구버전 저장 데이터(병합정보 없음)는 1회만 자동 병합 적용
          var ver=localStorage.getItem(LS_KEY+"_mv");
          if(ver!=="1"){
            p=p.map(function(x){ return autoMerge(x); });
            try{ localStorage.setItem(LS_KEY, JSON.stringify(p)); localStorage.setItem(LS_KEY+"_mv","1"); }catch(e){}
          }
          return p;
        }
      }
    }catch(e){}
    try{ localStorage.setItem(LS_KEY+"_mv","1"); }catch(e){}
    return SEED.map(function(x,i){ return autoMerge(assign({}, x, {id:x.id||("c"+i)})); });
  }
  function saveData(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(data)); }catch(e){} }
  function loadColW(){ try{ var s=localStorage.getItem(LS_W); if(s){ var p=JSON.parse(s); COLS.forEach(function(c){ if(p[c.key]) c.w=p[c.key]; }); } }catch(e){} }
  function saveColW(){ try{ var o={}; COLS.forEach(function(c){o[c.key]=c.w;}); localStorage.setItem(LS_W, JSON.stringify(o)); }catch(e){} }
  function assign(t){ for(var i=1;i<arguments.length;i++){var s=arguments[i]; for(var k in s) if(Object.prototype.hasOwnProperty.call(s,k)) t[k]=s[k];} return t; }
  function snapshot(){ hist.push(JSON.stringify(data)); if(hist.length>80) hist.shift(); future=[]; }
  function undo(){ if(!hist.length){notify("되돌릴 작업 없음");return;} future.push(JSON.stringify(data)); data=JSON.parse(hist.pop()); saveData(); render(); notify("실행취소"); }
  function redo(){ if(!future.length){notify("다시 실행할 작업 없음");return;} hist.push(JSON.stringify(data)); data=JSON.parse(future.pop()); saveData(); render(); notify("다시 실행"); }

  function num(v){ var s=String(v==null?"":v).replace(/[^0-9]/g,""); return s?parseInt(s,10):""; }
  function fmtNum(v){ var n=num(v); return n===""?"":n.toLocaleString(); }
  function cellText(row,col){ return col.type==="num"?fmtNum(row[col.key]):String(row[col.key]==null?"":row[col.key]); }
  function cellRaw(row,col){ if(col.type==="num"){var n=num(row[col.key]);return n===""?"":String(n);} return String(row[col.key]==null?"":row[col.key]); }

  function viewRows(){
    var rows=data.map(function(r,i){ return {row:r, di:i}; });
    if(searchQ){ var q=searchQ.toLowerCase(); rows=rows.filter(function(o){ return String(o.row.n||"").toLowerCase().indexOf(q)>=0; }); }
    if(sortState.key&&sortState.dir){
      var col=null; COLS.forEach(function(c){ if(c.key===sortState.key) col=c; });
      rows.sort(function(a,b){
        var va=a.row[sortState.key], vb=b.row[sortState.key];
        if(col&&col.type==="num"){ return ((num(va)||0)-(num(vb)||0))*sortState.dir; }
        return String(va==null?"":va).localeCompare(String(vb==null?"":vb),"ko")*sortState.dir;
      });
    }
    return rows;
  }

  var root=document.getElementById("root");

  // ===== CSV 파싱 (따옴표·쉼표·줄바꿈 처리) =====
  function parseCSV(text){
    text=text.replace(/^\ufeff/,""); // BOM 제거
    var rows=[], row=[], cur="", i=0, inQ=false;
    while(i<text.length){
      var ch=text[i];
      if(inQ){
        if(ch==='"'){ if(text[i+1]==='"'){ cur+='"'; i+=2; continue; } inQ=false; i++; continue; }
        cur+=ch; i++; continue;
      }
      if(ch==='"'){ inQ=true; i++; continue; }
      if(ch===','){ row.push(cur); cur=""; i++; continue; }
      if(ch==='\r'){ i++; continue; }
      if(ch==='\n'){ row.push(cur); rows.push(row); row=[]; cur=""; i++; continue; }
      cur+=ch; i++;
    }
    if(cur!==""||row.length){ row.push(cur); rows.push(row); }
    return rows;
  }
  // 시트 헤더 → 도구 필드 매핑
  var HEADER_MAP={
    "크리에이터명":"n","이름":"n","name":"n",
    "숏폼 1채널":"s1","숏폼1채널":"s1","1채널":"s1","s1":"s1",
    "2채널":"s2","숏폼 2채널":"s2","s2":"s2",
    "3채널":"s3","숏폼 3채널":"s3","s3":"s3",
    "피드":"fd","feed":"fd",
    "롱폼":"lf","long":"lf",
    "인스타그램":"ig","인스타":"ig","instagram":"ig",
    "틱톡":"tt","tiktok":"tt",
    "유튜브":"yt","youtube":"yt"
  };
  function csvToData(text){
    var rows=parseCSV(text);
    if(!rows.length) return null;
    // 헤더 행 찾기 (크리에이터명 포함된 행)
    var hi=-1;
    for(var r=0;r<Math.min(rows.length,5);r++){
      if(rows[r].some(function(c){ return String(c).replace(/\s/g,"").indexOf("크리에이터명")>=0 || HEADER_MAP[String(c).trim()]==="n"; })){ hi=r; break; }
    }
    if(hi===-1) hi=0;
    var headers=rows[hi].map(function(c){ return String(c).trim(); });
    var colMap=headers.map(function(h){ return HEADER_MAP[h]||HEADER_MAP[h.replace(/\s/g,"")]||null; });
    var out=[];
    for(var i=hi+1;i<rows.length;i++){
      var rr=rows[i]; if(!rr) continue;
      var obj={id:"", n:"",s1:"",s2:"",s3:"",fd:"",lf:"",ig:"",tt:"",yt:""};
      colMap.forEach(function(key,ci){ if(key){ var v=String(rr[ci]==null?"":rr[ci]).trim(); if(key==="s1"||key==="s2"||key==="s3"||key==="fd"||key==="lf"){ v=v.replace(/[^0-9]/g,""); } obj[key]=v; } });
      if(!obj.n) continue;
      obj.id="sheet_"+obj.n.replace(/\s/g,"_")+"_"+i;
      autoMerge(obj); // 시트 병합 자동 반영
      out.push(obj);
    }
    return out;
  }

  // 두 데이터셋 비교 → 변경 목록 [{name, field, before, after}]
  function diffData(oldArr, newArr){
    var changes=[];
    var oldByName={}; (oldArr||[]).forEach(function(r){ oldByName[r.n]=r; });
    var newByName={}; (newArr||[]).forEach(function(r){ newByName[r.n]=r; });
    var FIELDS=[["s1","숏폼 1채널"],["s2","2채널"],["s3","3채널"],["fd","피드"],["lf","롱폼"],["ig","인스타그램"],["tt","틱톡"],["yt","유튜브"]];
    newArr.forEach(function(nw){
      var od=oldByName[nw.n];
      if(!od){ changes.push({name:nw.n, field:"", before:"", after:"", kind:"신규 추가(시트)"}); return; }
      FIELDS.forEach(function(f){
        var a=String(od[f[0]]==null?"":od[f[0]]), b=String(nw[f[0]]==null?"":nw[f[0]]);
        if(a!==b) changes.push({name:nw.n, field:f[1], before:a, after:b, kind:"edit"});
      });
    });
    (oldArr||[]).forEach(function(od){ if(!newByName[od.n]) changes.push({name:od.n, field:"", before:"", after:"", kind:"시트에서 삭제됨"}); });
    return changes;
  }

  function loadSnap(){ try{ var s=localStorage.getItem(LS_SNAP); return s?JSON.parse(s):null; }catch(e){ return null; } }
  function saveSnap(arr){ try{ localStorage.setItem(LS_SNAP, JSON.stringify(arr)); }catch(e){} }

  var pendingSheet=null; // 변경 감지 후 확인 대기 중인 새 데이터
  var fetching=false;    // 중복 fetch 방지
  function fetchSheet(isFirst, isManual){
    if(!SHEET_CSV_URL){ if(isFirst) render(); return; }
    if(fetching){ if(isManual) notify("확인 중입니다..."); return; }
    if(pendingSheet && !isFirst && !isManual) return; // 확인 대기 중이면 폴링 스킵
    fetching=true;
    // 구글 CDN 캐시 회피: URL에 매번 다른 값 붙임
    var url=SHEET_CSV_URL+(SHEET_CSV_URL.indexOf("?")>=0?"&":"?")+"_t="+Date.now();
    fetch(url, {cache:"no-store"}).then(function(r){ return r.text(); }).then(function(text){
      fetching=false;
      var newData=csvToData(text);
      if(!newData||!newData.length){ if(isFirst) render(); if(isManual) notify("시트에서 데이터를 읽지 못했습니다."); return; }
      var snap=loadSnap();
      // 최초이거나 기준선(snap)이 아예 없으면 → 기준선부터 세팅 (비교 없이 반영)
      if(!snap){
        data=newData.map(function(x){ return assign({},x); });
        saveData(); saveSnap(newData); render();
        notify("구글 시트에서 "+newData.length+"명 불러왔습니다.");
        return;
      }
      // 항상 snap(마지막으로 확인·반영한 시트 상태) 기준으로만 비교
      var changes=diffData(snap, newData);
      if(changes.length){
        if(pendingSheet && sameChanges(pendingSheet.changes, changes)){ return; }
        pendingSheet={data:newData, changes:changes};
        showMasterAlert(changes);
      }else{
        if(isManual) notify("마스터 시트와 동일합니다. (변경 없음)");
      }
    }).catch(function(e){
      fetching=false;
      if(isFirst){ render(); notify("시트를 불러오지 못했습니다. 저장된 데이터로 표시합니다. (인터넷/링크 확인)"); }
      else if(isManual){ notify("시트 확인 실패: 인터넷 연결이나 시트 게시 상태를 확인하세요."); }
    });
  }
  // ===== 초기화: 도구에서 수정한 내용 버리고 마스터 시트 상태로 =====
  function resetToSheet(){
    if(!confirm("도구에서 수정한 내용을 모두 버리고\n마스터 시트의 최신 내용으로 되돌립니다.\n\n계속할까요?")) return;
    notify("마스터 시트에서 다시 불러오는 중...");
    var url=SHEET_CSV_URL+(SHEET_CSV_URL.indexOf("?")>=0?"&":"?")+"_t="+Date.now();
    fetch(url, {cache:"no-store"}).then(function(r){ return r.text(); }).then(function(text){
      var newData=csvToData(text);
      if(!newData||!newData.length){ notify("시트를 읽지 못했습니다. 잠시 후 다시 시도하세요."); return; }
      snapshot(); // Ctrl+Z로 되돌릴 수 있게
      data=newData.map(function(x){ return assign({},x); });
      saveData(); saveSnap(newData);
      pendingSheet=null;
      sel=null; searchQ=""; sortState={key:null,dir:0};
      render();
      notify("마스터 시트 상태로 초기화되었습니다 ("+newData.length+"명)");
    }).catch(function(e){
      notify("초기화 실패: 인터넷 연결을 확인하세요.");
    });
  }

  // 변경 목록이 동일한지 (반복 알림 방지용)
  function sameChanges(a,b){
    if(a.length!==b.length) return false;
    for(var i=0;i<a.length;i++){ if(a[i].name!==b[i].name||a[i].field!==b[i].field||a[i].after!==b[i].after) return false; }
    return true;
  }
  function applyPendingSheet(){
    if(!pendingSheet) return;
    // 변경분을 수정 기록에 남김 (마스터 시트 변경만 기록됨)
    pendingSheet.changes.forEach(function(ch){
      if(ch.kind==="edit") editLog.unshift({t:nowStr(), name:ch.name, field:ch.field, before:ch.before, after:ch.after, kind:"edit"});
      else editLog.unshift({t:nowStr(), name:ch.name, field:"", before:"", after:"", kind:ch.kind});
    });
    saveLog();
    data=pendingSheet.data.map(function(x){ return assign({},x); });
    saveData();
    saveSnap(pendingSheet.data); // 기준선을 방금 반영한 시트로 갱신 → 다음 폴링부터 이걸 기준으로
    pendingSheet=null; render();
    notify("최신 단가가 반영되었습니다.");
  }

  function selContains(r,c){
    if(!sel) return false;
    var r1=Math.min(sel.r1,sel.r2), r2=Math.max(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    return r>=r1&&r<=r2&&c>=c1&&c<=c2;
  }
  function rowSelected(ri){ if(!sel) return false; var r1=Math.min(sel.r1,sel.r2),r2=Math.max(sel.r1,sel.r2),c1=Math.min(sel.c1,sel.c2),c2=Math.max(sel.c1,sel.c2); return ri>=r1&&ri<=r2&&c1===0&&c2===COLS.length-1; }
  function colSelected(ci){ if(!sel) return false; var c1=Math.min(sel.c1,sel.c2),c2=Math.max(sel.c1,sel.c2),r1=Math.min(sel.r1,sel.r2); return ci>=c1&&ci<=c2&&r1<=-1; }
  function selDesc(){
    var r1=Math.min(sel.r1,sel.r2),r2=Math.max(sel.r1,sel.r2),c1=Math.min(sel.c1,sel.c2),c2=Math.max(sel.c1,sel.c2);
    return '선택: '+(r2-r1+1)+'행 × '+(c2-c1+1)+'열'+(r1<0?' (헤더 포함)':'');
  }

    // 셀 + 헤더셀 드래그 선택
    var selCells=root.querySelectorAll("td.xl-td, th.xl-th");
    for(var k=0;k<selCells.length;k++){
      var td=selCells[k];
      td.onmousedown=function(e){
        if(e.target.classList.contains("xl-sort")) return;
        if(e.button===2) return; // 우클릭은 선택 유지
        if(editingCell){ commitEdit(vr); }
        var r=parseInt(this.getAttribute("data-r"),10), c=parseInt(this.getAttribute("data-c"),10);
        anchor={r:r,c:c}; sel={r1:r,c1:c,r2:r,c2:c}; dragging="cell";
        updateSelDom(); e.preventDefault();
      };
      td.onmouseenter=function(e){
        if(dragging!=="cell"||!anchor) return;
        var r=parseInt(this.getAttribute("data-r"),10), c=parseInt(this.getAttribute("data-c"),10);
        sel={r1:anchor.r,c1:anchor.c,r2:r,c2:c}; updateSelDom();
      };
      td.ondblclick=function(){
        var r=parseInt(this.getAttribute("data-r"),10), c=parseInt(this.getAttribute("data-c"),10);
        if(r<0) return;

        var inp=root.querySelector(".xl-input"); if(inp){ inp.focus(); inp.select(); }
      };
      td.oncontextmenu=function(e){
        e.preventDefault();
        var r=parseInt(this.getAttribute("data-r"),10), c=parseInt(this.getAttribute("data-c"),10);

    // 행번호: 클릭/드래그 = 행선택, 우클릭 = 행메뉴
    var rns=root.querySelectorAll(".xl-rownum");
    for(var j=0;j<rns.length;j++){
      rns[j].onmousedown=function(e){
        if(e.button===2) return;
        var r=parseInt(this.getAttribute("data-row"),10);
        anchor={r:r,c:0}; sel={r1:r,c1:0,r2:r,c2:COLS.length-1}; dragging="row";
        updateSelDom(); e.preventDefault();
      };
      rns[j].onmouseenter=function(e){
        if(dragging!=="row"||!anchor) return;
        var r=parseInt(this.getAttribute("data-row"),10);
        sel={r1:anchor.r,c1:0,r2:r,c2:COLS.length-1}; updateSelDom();

      rns[j].oncontextmenu=function(e){

  function updateSelDom(){
    var cells=root.querySelectorAll("td.xl-td, th.xl-th");
    for(var i=0;i<cells.length;i++){
      var r=parseInt(cells[i].getAttribute("data-r"),10), c=parseInt(cells[i].getAttribute("data-c"),10);

    var sb=root.querySelector(".xl-status span"); if(sb&&sel) sb.textContent=selDesc();
  }

  document.addEventListener("mouseup",function(){ dragging=false; });

  // ===== 열 리사이즈 =====
  function startResize(ci, startX){
    var startW=COLS[ci].w;
    document.body.style.cursor="col-resize";
    function move(e){ var d=e.clientX-startX; COLS[ci].w=Math.max(36, startW+d); applyColW(ci); }
    function up(){ document.removeEventListener("mousemove",move); document.removeEventListener("mouseup",up); document.body.style.cursor=""; saveColW(); }
    document.addEventListener("mousemove",move); document.addEventListener("mouseup",up);
  }
  function applyColW(ci){

  }

  function toggleSort(key){

    else { sortState.key=key; sortState.dir=1; }

  }

  function commitEdit(vr){

    var inp=root.querySelector(".xl-input"); if(!inp){ editingCell=null; return; }
    var val=inp.value, o=vr[editingCell.r], col=COLS[editingCell.c];
    if(o){

      var oldVal=String(data[o.di][col.key]==null?"":data[o.di][col.key]);
      if(newVal!==oldVal){
        snapshot();

  }

  // ===== 컨텍스트 메뉴 =====
  function closeMenu(){ var m=document.getElementById("xl-ctx"); if(m) m.parentNode.removeChild(m); }
  function showMenu(x,y,items){
    closeMenu();
    var m=document.createElement("div"); m.id="xl-ctx"; m.className="xl-ctx";
    items.forEach(function(it){
      if(it.sep){ var s=document.createElement("div"); s.className="xl-ctx-sep"; m.appendChild(s); return; }
      var d=document.createElement("div"); d.className="xl-ctx-item"+(it.danger?" xl-ctx-danger":""); d.textContent=it.label;
      d.onclick=function(){ closeMenu(); it.fn(); };
      m.appendChild(d);
    });
    document.body.appendChild(m);
    var mw=m.offsetWidth, mh=m.offsetHeight, vw=window.innerWidth, vh=window.innerHeight;
    m.style.left=Math.min(x, vw-mw-6)+"px";
    m.style.top=Math.min(y, vh-mh-6)+"px";
  }
  document.addEventListener("mousedown",function(e){ var m=document.getElementById("xl-ctx"); if(m&&!m.contains(e.target)) closeMenu(); });
  document.addEventListener("scroll",closeMenu,true);

  function showCellMenu(x,y,vr){
    var ri=sel?Math.min(sel.r1,sel.r2):0;
    var items=[
      {label:"복사", fn:function(){ copySelection(vr); }},
      {label:"잘라내기", fn:function(){ cutSelection(vr); }},
      {label:"붙여넣기", fn:function(){ pasteFromBuf(vr); }},
      {sep:true}
    ];
    if(canMerge()) items.push({label:"셀 병합 (가로)", fn:function(){ mergeCells(vr); }});
    if(cellHasMerge(ri,vr)) items.push({label:"병합 해제", fn:function(){ unmergeCells(vr); }});
    if(canMerge()||cellHasMerge(ri,vr)) items.push({sep:true});
    items.push({label:"위에 행 삽입", fn:function(){ insertRow(vr,"above"); }});
    items.push({label:"아래에 행 삽입", fn:function(){ insertRow(vr,"below"); }});
    items.push({label:"행 삭제", danger:true, fn:function(){ delSelectedRows(vr); }});
    items.push({sep:true});
    items.push({label:"선택 영역 지우기(값)", danger:true, fn:function(){ clearSelection(vr); }});
    showMenu(x,y,items);
  }
  function showRowMenu(x,y,r,vr){
    showMenu(x,y,[
      {label:"복사", fn:function(){ copySelection(vr); }},
      {label:"잘라내기", fn:function(){ cutSelection(vr); }},
      {label:"붙여넣기", fn:function(){ pasteFromBuf(vr); }},
      {sep:true},
      {label:"위에 행 삽입", fn:function(){ insertRow(vr,"above"); }},
      {label:"아래에 행 삽입", fn:function(){ insertRow(vr,"below"); }},
      {label:"행 삭제", danger:true, fn:function(){ delSelectedRows(vr); }}
    ]);
  }
  function showColMenu(x,y,ci,vr){
    showMenu(x,y,[
      {label:"이 열 복사", fn:function(){ copySelection(vr); }},
      {sep:true},
      {label:"오름차순 정렬 ▲", fn:function(){ sortState={key:COLS[ci].key,dir:1}; sel=null; render(); }},
      {label:"내림차순 정렬 ▼", fn:function(){ sortState={key:COLS[ci].key,dir:-1}; sel=null; render(); }},
      {label:"정렬 해제", fn:function(){ sortState={key:null,dir:0}; render(); }},
      {sep:true},
      {label:"이 열 값 전체 지우기", danger:true, fn:function(){ clearColumn(ci,vr); }}

  // ===== 행/열 편집 동작 =====
  function insertRow(vr, where){
    var r1=Math.max(0,Math.min(sel?sel.r1:0, sel?sel.r2:0));
    var o=vr[r1]; var at=o?o.di:0;
    if(where==="below") at=at+1;
    snapshot();
    var nr={id:"c"+Date.now(), n:"신규", s1:"",s2:"",s3:"",fd:"",lf:"",ig:"",tt:"",yt:""};
    data.splice(at,0,nr); saveData(); sel=null; render(); notify("행 삽입됨");
  }
  function delSelectedRows(vr){
    if(!sel){ notify("삭제할 행을 선택하세요"); return; }
    var r1=Math.max(0,Math.min(sel.r1,sel.r2)), r2=Math.max(sel.r1,sel.r2);
    var dis=[], names=[]; for(var r=r1;r<=r2;r++){ if(vr[r]){ dis.push(vr[r].di); names.push(vr[r].row.n||"(이름없음)"); } }
    if(!dis.length){ notify("삭제할 데이터 행이 없습니다"); return; }
    snapshot();
    var set={}; dis.forEach(function(d){set[d]=1;});
    data=data.filter(function(_,i){ return !set[i]; });
    saveData(); sel=null; render(); notify(dis.length+"개 행 삭제됨 (Ctrl+Z로 복구)");
  }
  function clearSelection(vr){
    if(!sel) return;
    var r1=Math.max(0,Math.min(sel.r1,sel.r2)), r2=Math.max(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    snapshot();
    for(var r=r1;r<=r2;r++){ var o=vr[r]; if(!o) continue; for(var c=c1;c<=c2;c++){ data[o.di][COLS[c].key]=""; } }
    saveData(); render(); notify("선택 영역 값 지움");
  }
  function clearColumn(ci,vr){
    if(!confirm('"'+COLS[ci].label+'" 열 값을 전체 지울까요?')) return;
    snapshot(); data.forEach(function(row){ row[COLS[ci].key]=""; }); saveData(); render(); notify(COLS[ci].label+" 열 지움");
  }

  // ===== 셀 병합 (가로, 엑셀 방식: 왼쪽 위 값만 유지) =====
  function canMerge(){
    if(!sel) return false;
    var r1=Math.min(sel.r1,sel.r2), r2=Math.max(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    return r1>=0 && r1===r2 && c2>c1; // 한 행에서 2칸 이상 가로 선택
  }
  function mergeCells(vr){
    if(!canMerge()){ notify("같은 행에서 가로로 2칸 이상 선택하세요"); return; }
    var ri=Math.min(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    var o=vr[ri]; if(!o) return;
    snapshot();
    var row=data[o.di];
    // 엑셀 방식: 왼쪽 위(c1) 값만 유지, 나머지 비움
    for(var c=c1+1;c<=c2;c++){ row[COLS[c].key]=""; }
    // 기존 병합 중 겹치는 것 제거 후 추가
    var m=(row._m||[]).filter(function(g){ return g.c2<c1 || g.c1>c2; });
    m.push({c1:c1,c2:c2}); m.sort(function(a,b){return a.c1-b.c1;});
    row._m=m;
    saveData(); render(); notify("병합 완료 ("+COLS[c1].label+"~"+COLS[c2].label+")");
  }
  function unmergeCells(vr){
    if(!sel){ notify("병합 해제할 셀을 선택하세요"); return; }
    var ri=Math.min(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    var o=vr[ri]; if(!o||!data[o.di]._m) { notify("병합된 셀이 없습니다"); return; }
    snapshot();
    var row=data[o.di];
    row._m=(row._m||[]).filter(function(g){ return g.c2<c1 || g.c1>c2; });
    if(!row._m.length) delete row._m;
    saveData(); render(); notify("병합 해제됨");
  }
  function cellHasMerge(ri,vr){
    var o=vr[ri]; return o && data[o.di]._m && data[o.di]._m.length;
  }

  // ===== 잘라내기 / 붙여넣기 (내부 버퍼) =====
  function cutSelection(vr){
    if(!sel) return;
    copySelection(vr); // 클립보드 + 내부 버퍼(rowMode 포함) 저장
    var r1=Math.max(0,Math.min(sel.r1,sel.r2)), r2=Math.max(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    snapshot();
    for(var r2i=r1;r2i<=r2;r2i++){ var o2=vr[r2i]; if(!o2) continue; for(var cc=c1;cc<=c2;cc++) data[o2.di][COLS[cc].key]=""; }
    saveData(); render(); notify("잘라내기 완료 (붙여넣기 가능)");
  }
  function pasteFromBuf(vr){
    if(!clipboardBuf){ notify("붙여넣을 내용이 없습니다 (먼저 복사/잘라내기)"); return; }
    if(!sel){ notify("붙여넣을 위치를 선택하세요"); return; }
    var startR=Math.max(0,Math.min(sel.r1,sel.r2)), startC=Math.min(sel.c1,sel.c2);
    snapshot();
    if(clipboardBuf.rowMode){
      // ── 행 단위 붙여넣기: 대상 행을 복사한 행 내용으로 통째로 덮어쓰기 (엑셀과 동일) ──
      var n=0;
      clipboardBuf.rows.forEach(function(srcRow,ri){
        var o=vr[startR+ri]; if(!o) return;
        var target=data[o.di];
        COLS.forEach(function(col){ target[col.key]=srcRow[col.key]==null?"":srcRow[col.key]; });
        if(srcRow._m) target._m=JSON.parse(JSON.stringify(srcRow._m)); else delete target._m;
        n++;
      });
      saveData(); render(); notify(n+"개 행 붙여넣기 완료 (Ctrl+Z로 복구)");
      return;
    }
    // ── 셀 범위 붙여넣기 ──
    clipboardBuf.rows.forEach(function(line,ri){
      var o=vr[startR+ri]; if(!o) return;
      line.forEach(function(val,ci){
        var col=COLS[startC+ci]; if(!col) return;
        data[o.di][col.key]=(col.type==="num")?(num(val)===""?"":String(num(val))):val;
      });
    });
    saveData(); render(); notify("붙여넣기 완료");
  }

  // ===== 선택 복사 (HTML+TSV) =====
  function copySelection(vr){
    if(!sel){ notify("복사할 셀을 선택하세요"); return; }
    var r1=Math.min(sel.r1,sel.r2), r2=Math.max(sel.r1,sel.r2), c1=Math.min(sel.c1,sel.c2), c2=Math.max(sel.c1,sel.c2);
    var includeHeader=(r1<0), dr1=Math.max(0,r1);
    // ── 내부 버퍼 저장 (도구 안에서 붙여넣기용) ──
    var isRowMode=(c1===0 && c2===COLS.length-1); // 행 전체 선택이면 행 단위 복사
    var bufRows=[];
    for(var br=dr1;br<=r2;br++){
      var bo=vr[br]; if(!bo) continue;
      if(isRowMode){
        // 행 전체: 데이터 객체를 통째로 복사 (병합정보 포함, id는 제외)
        var copy={}; COLS.forEach(function(cc){ copy[cc.key]=bo.row[cc.key]; });
        if(bo.row._m) copy._m=JSON.parse(JSON.stringify(bo.row._m));
        bufRows.push(copy);
      }else{
        var line=[]; for(var bc=c1;bc<=c2;bc++) line.push(cellRaw(bo.row,COLS[bc]));
        bufRows.push(line);
      }
    }
    clipboardBuf={rows:bufRows, c1:c1, rowMode:isRowMode};
    var tsvLines=[], htmlRows=[];
    if(includeHeader){
      var hcells=[]; for(var c=c1;c<=c2;c++) hcells.push(COLS[c].label);
      tsvLines.push(hcells.join("\t"));
      htmlRows.push('<tr>'+hcells.map(function(t){return '<td style="background:'+HEADER_BG+';border:1px solid '+BORDER+';padding:4px 8px;font-family:Malgun Gothic,sans-serif;font-size:12px;text-align:center;">'+esc(t)+'</td>';}).join("")+'</tr>');
    }
    for(var r=dr1;r<=r2;r++){
      var o=vr[r]; if(!o) continue;
      var merges=o.row._m||[];
      var tcells=[], hc=[];
      var cc=c1;
      while(cc<=c2){
        var col=COLS[cc];
        // 병합 시작?
        var mg=null; for(var mi=0;mi<merges.length;mi++){ if(merges[mi].c1===cc && merges[mi].c2<=c2){ mg=merges[mi]; break; } }
        if(mg){
          var span=mg.c2-mg.c1+1;
          var raw=cellRaw(o.row,col), disp=cellText(o.row,col);
          tcells.push(raw.replace(/[\t\r\n]/g," "));
          for(var k=1;k<span;k++) tcells.push(""); // 엑셀 붙여넣기용 빈칸
          var stm='border:1px solid '+BORDER+';padding:4px 8px;font-family:Malgun Gothic,sans-serif;font-size:12px;text-align:center;'+(col.bold?'font-weight:700;':'');
          hc.push('<td colspan="'+span+'" style="'+stm+'">'+esc(disp)+'</td>');
          cc=mg.c2+1;
        }else{
          var col2=COLS[cc], raw2=cellRaw(o.row,col2), disp2=cellText(o.row,col2);
          tcells.push(raw2.replace(/[\t\r\n]/g," "));
          var st='border:1px solid '+BORDER+';padding:4px 8px;font-family:Malgun Gothic,sans-serif;font-size:12px;'+(col2.center?'text-align:center;':'')+(col2.bold?'font-weight:700;':'')+(col2.link?'color:'+LINK+';':'');
          hc.push('<td style="'+st+'">'+esc(disp2)+'</td>');
          cc++;
        }
      }
      tsvLines.push(tcells.join("\t")); htmlRows.push('<tr>'+hc.join("")+'</tr>');
    }
    var tsv=tsvLines.join("\n"), html='<table style="border-collapse:collapse;">'+htmlRows.join("")+'</table>';
    copyDual(html, tsv, function(ok){ notify(ok?('복사 완료 ('+tsvLines.length+'행 × '+(c2-c1+1)+'열'+(includeHeader?', 헤더 포함':'')+'). 붙여넣기(Ctrl+V)'):'복사 실패'); });
  }
  function copyDual(html, tsv, cb){
    if(window.ClipboardItem && navigator.clipboard && navigator.clipboard.write){
      try{ var item=new ClipboardItem({"text/html":new Blob([html],{type:"text/html"}),"text/plain":new Blob([tsv],{type:"text/plain"})});
        navigator.clipboard.write([item]).then(function(){cb(true);},function(){ fallbackCopy(html,tsv,cb); }); return;
      }catch(e){}
    }
    fallbackCopy(html,tsv,cb);
  }
  function fallbackCopy(html, tsv, cb){
    var done=false;
    function onCopy(e){ e.clipboardData.setData("text/html",html); e.clipboardData.setData("text/plain",tsv); e.preventDefault(); done=true; }
    document.addEventListener("copy",onCopy,{once:true});
    try{
      var tmp=document.createElement("div"); tmp.contentEditable="true"; tmp.style.position="fixed"; tmp.style.left="-9999px"; tmp.innerHTML=html;
      document.body.appendChild(tmp);
      var range=document.createRange(); range.selectNodeContents(tmp);
      var s=window.getSelection(); s.removeAllRanges(); s.addRange(range);
      var ok=document.execCommand("copy"); s.removeAllRanges(); document.body.removeChild(tmp); cb(ok||done);
    }catch(e){ document.removeEventListener("copy",onCopy); cb(false); }
  }

  // ===== 3. 엑셀(.xls) 다운로드 — SpreadsheetML(XML) 방식, 라이브러리 불필요 =====
  function downloadXLSX(){
    var xmlRows=[];
    var hc=COLS.map(function(c){ return '<Cell ss:StyleID="hdr"><Data ss:Type="String">'+xesc(c.label)+'</Data></Cell>'; }).join("");
    xmlRows.push('<Row>'+hc+'</Row>');
    data.forEach(function(row){
      var cells=COLS.map(function(c){
        if(c.type==="num"){ var n=num(row[c.key]); return n===""?'<Cell ss:StyleID="d"/>':'<Cell ss:StyleID="d"><Data ss:Type="Number">'+n+'</Data></Cell>'; }
        var v=String(row[c.key]==null?"":row[c.key]);
        return v===""?'<Cell ss:StyleID="t"/>':'<Cell ss:StyleID="t"><Data ss:Type="String">'+xesc(v)+'</Data></Cell>';
      }).join("");
      xmlRows.push('<Row>'+cells+'</Row>');
    });
    var cols=COLS.map(function(c){ return '<Column ss:Width="'+Math.round(c.w*0.75)+'"/>'; }).join("");
    var xml='<?xml version="1.0" encoding="UTF-8"?>\n'
      +'<?mso-application progid="Excel.Sheet"?>\n'
      +'<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n'
      +'<Styles>'
      +'<Style ss:ID="hdr"><Interior ss:Color="#FCE5CD" ss:Pattern="Solid"/><Alignment ss:Horizontal="Center" ss:Vertical="Center"/><Borders>'+borderXML()+'</Borders></Style>'
      +'<Style ss:ID="d"><Font ss:Bold="1"/><Alignment ss:Horizontal="Center"/><Borders>'+borderXML()+'</Borders></Style>'
      +'<Style ss:ID="t"><Borders>'+borderXML()+'</Borders></Style>'
      +'</Styles>'
      +'<Worksheet ss:Name="크리에이터 단가"><Table>'+cols+xmlRows.join("")+'</Table></Worksheet>'
      +'</Workbook>';
    var blob=new Blob(["\ufeff"+xml],{type:"application/vnd.ms-excel;charset=utf-8"});
    var fname="AG-ENT_크리에이터_단가표_"+nowStr().replace(/[: ]/g,"").slice(0,12)+".xls";
    downloadBlob(blob, fname);
    notify("엑셀 파일 다운로드 ("+data.length+"명)");
  }
  function borderXML(){ return ['Left','Top','Right','Bottom'].map(function(p){return '<Border ss:Position="'+p+'" ss:LineStyle="Continuous" ss:Weight="1" ss:Color="#000000"/>';}).join(""); }
  function xesc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function downloadBlob(blob, fname){
    try{
      var url=URL.createObjectURL(blob), a=document.createElement("a");
      a.href=url; a.download=fname; document.body.appendChild(a); a.click();
      setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },800);
      return true;
    }catch(e){ notify("다운로드 실패: "+(e.message||e)); return false; }
  }

  // ===== 4. 수정 기록 모달 =====
  function showLogModal(){
    closeOverlay();
    var ov=document.createElement("div"); ov.id="xl-overlay"; ov.className="xl-overlay";
    var box=document.createElement("div"); box.className="xl-modal"; ov.appendChild(box);
    function draw(){
      var list=editLog;
      var h=[];
      h.push('<div class="xl-modal-head"><b>수정 기록</b> <span class="xl-modal-sub">'+editLog.length+'건 · 최신순</span>');
      h.push('<button class="xl-modal-x" id="xl-log-x">✕</button></div>');
      h.push('<div class="xl-modal-tools">');
      h.push('<button class="xl-btn" id="xl-log-export">기록 내보내기(CSV)</button>');
      h.push('<button class="xl-btn" id="xl-log-clear" style="color:#c0392b">기록 전체 삭제</button></div>');
      h.push('<div class="xl-log-list">');
      if(list.length===0) h.push('<div class="xl-log-empty">기록이 없습니다.</div>');
      list.forEach(function(e){
        if(e.kind==="edit"){
          h.push('<div class="xl-log-row"><span class="xl-log-t">'+esc(e.t)+'</span>'
            +'<span class="xl-log-name">'+esc(e.name)+'</span>'
            +'<span class="xl-log-field">'+esc(e.field)+'</span>'
            +'<span class="xl-log-chg"><span class="xl-log-b">'+esc(e.before||"(빈값)")+'</span> → <span class="xl-log-a">'+esc(e.after||"(빈값)")+'</span></span></div>');
        }else{
          h.push('<div class="xl-log-row"><span class="xl-log-t">'+esc(e.t)+'</span>'
            +'<span class="xl-log-name">'+esc(e.name)+'</span>'
            +'<span class="xl-log-act">'+esc(e.kind)+'</span></div>');
        }
      });
      h.push('</div>');
      box.innerHTML=h.join("");
      box.querySelector("#xl-log-x").onclick=closeOverlay;
      box.querySelector("#xl-log-export").onclick=exportLogCSV;
      box.querySelector("#xl-log-clear").onclick=function(){ if(confirm("수정 기록을 전체 삭제할까요? (되돌릴 수 없음)")){ editLog=[]; saveLog(); draw(); render(); } };
    }
    draw();
    ov.onclick=function(e){ if(e.target===ov) closeOverlay(); };
    document.body.appendChild(ov);
  }
  function exportLogCSV(){
    var rows=[["일시","크리에이터","항목","변경전","변경후","동작"]];
    editLog.forEach(function(e){ rows.push([e.t,e.name,e.field,e.before,e.after,e.kind==="edit"?"수정":e.kind]); });
    var csv=rows.map(function(r){ return r.map(function(c){ var s=String(c==null?"":c); return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; }).join(","); }).join("\r\n");
    downloadBlob(new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"}), "AG-ENT_수정기록_"+nowStr().replace(/[: ]/g,"").slice(0,12)+".csv");
    notify("수정 기록 CSV 내보냄");
  }
  function closeOverlay(){ var o=document.getElementById("xl-overlay"); if(o) o.parentNode.removeChild(o); }

  // ===== 마스터 시트 변경 알림 =====
  function showMasterAlert(changes){
    closeOverlay();
    var isDemo=!changes||!changes.length;
    var list=changes||[];
    var ov=document.createElement("div"); ov.id="xl-overlay"; ov.className="xl-overlay xl-overlay-alert";
    var box=document.createElement("div"); box.className="xl-modal xl-modal-alert";
    var h=[];
    h.push('<div class="xl-alert-icon">🔔</div>');
    h.push('<div class="xl-alert-title">단가표가 업데이트되었습니다</div>');
    if(isDemo){
      h.push('<div class="xl-alert-body">마스터 시트에서 단가가 변동되었습니다.<br>확인을 눌러 최신 내용을 반영하세요. (예시)</div>');
    }else{
      var editCnt=list.filter(function(c){return c.kind==="edit";}).length;
      h.push('<div class="xl-alert-body">마스터 시트에서 <b>'+list.length+'건</b>이 변경되었습니다.<br>확인을 눌러 최신 내용을 반영하세요.</div>');
      h.push('<div class="xl-alert-changes">');
      list.slice(0,12).forEach(function(c){
        if(c.kind==="edit") h.push('<div class="xl-alert-chg"><b>'+esc(c.name)+'</b> · '+esc(c.field)+' <span class="xl-log-b">'+esc(c.before||"(빈값)")+'</span> → <span class="xl-log-a">'+esc(c.after||"(빈값)")+'</span></div>');
        else h.push('<div class="xl-alert-chg"><b>'+esc(c.name)+'</b> · '+esc(c.kind)+'</div>');
      });
      if(list.length>12) h.push('<div class="xl-alert-more">외 '+(list.length-12)+'건…</div>');
      h.push('</div>');
    }
    h.push('<button class="xl-btn xl-btn-p xl-alert-ok" id="xl-alert-ok">확인하고 최신 내용 보기</button>');
    box.innerHTML=h.join("");
    ov.appendChild(box); document.body.appendChild(ov);
    box.querySelector("#xl-alert-ok").onclick=function(){
      closeOverlay();
      if(isDemo){ notify("최신 내용이 반영되었습니다. (예시)"); }
      else { applyPendingSheet(); }
    };
  }

  document.addEventListener("keydown",function(e){
    if(editingCell) return;
    var mod=e.ctrlKey||e.metaKey;
    if(mod && (e.key==="c"||e.key==="C")){ var vr=viewRows(); if(sel){ copySelection(vr); e.preventDefault(); } }
    else if(mod && (e.key==="x"||e.key==="X")){ var v2=viewRows(); if(sel){ cutSelection(v2); e.preventDefault(); } }
    else if(mod && (e.key==="v"||e.key==="V")){ var v3=viewRows(); if(sel&&clipboardBuf){ pasteFromBuf(v3); e.preventDefault(); } }
    else if(mod && (e.key==="z"||e.key==="Z")){ undo(); e.preventDefault(); }
    else if(mod && (e.key==="y"||e.key==="Y")){ redo(); e.preventDefault(); }
    else if(mod && (e.key==="a"||e.key==="A")){ var v4=viewRows(); sel={r1:-1,c1:0,r2:v4.length-1,c2:COLS.length-1}; render(); e.preventDefault(); }
    else if(e.key==="Delete"||e.key==="Backspace"){ var v5=viewRows(); if(sel){ clearSelection(v5); e.preventDefault(); } }
    else if((e.key==="d"||e.key==="D")&&!mod){
      // 행 또는 열이 통째로 선택된 상태에서만 삭제
      var v6=viewRows();
      var rowMode = sel && Math.min(sel.c1,sel.c2)===0 && Math.max(sel.c1,sel.c2)===COLS.length-1;
      var colMode = sel && Math.min(sel.r1,sel.r2)<=-1;
      if(rowMode && !colMode){ delSelectedRows(v6); e.preventDefault(); }
      else if(colMode){ var ci=Math.min(sel.c1,sel.c2); clearColumn(ci,v6); e.preventDefault(); }
    }
  });

  var notifyTimer=null;
  function notify(msg){
    var n=document.getElementById("xl-notify");
    if(!n){ n=document.createElement("div"); n.id="xl-notify"; document.body.appendChild(n); }
    n.textContent=msg; n.className="show"; clearTimeout(notifyTimer); notifyTimer=setTimeout(function(){ n.className=""; },3000);
  }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  // 최초 로드: 시트에서 데이터 가져오기 (실패 시 저장된 데이터로)
  render(); // 우선 저장된 데이터로 즉시 표시
  fetchSheet(true); // 그 다음 시트 확인
  // 주기적으로 시트 변경 확인
  if(SHEET_CSV_URL){ setInterval(function(){ if(!pendingSheet) fetchSheet(false); }, SHEET_POLL_MS); }
})();
